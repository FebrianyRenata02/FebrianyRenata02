<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label {
      font: 800 18px 'Segoe UI', Arial, sans-serif;
      letter-spacing: 5px;
      fill: #baff9a;
    }

    .title {
      font: 900 45px 'Segoe UI', Arial, sans-serif;
      fill: #ffffff;
      filter: drop-shadow(0 0 12px rgba(57,255,20,.45));
    }

    .glow {
      filter: drop-shadow(0 0 8px #39ff14) drop-shadow(0 0 18px rgba(57,255,20,.55));
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    .scan {
      animation: scan 3.2s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .45; }
      50% { opacity: 1; }
    }

    @keyframes scan {
      0% { transform: translateX(-120px); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateX(420px); opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="760" y2="220">
      <stop offset="0%" stop-color="#020802"></stop>
      <stop offset="48%" stop-color="#061a08"></stop>
      <stop offset="100%" stop-color="#001000"></stop>
    </linearGradient>

    <radialGradient id="light" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity=".35"></stop>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"></stop>
    </radialGradient>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#39ff14" stroke-opacity=".13" stroke-width="1"></path>
      <circle cx="0" cy="0" r="1.3" fill="#39ff14" fill-opacity=".22"></circle>
    </pattern>
  </defs>

  <rect width="760" height="220" rx="34" fill="url(#bg)"></rect>
  <rect width="760" height="220" rx="34" fill="url(#grid)"></rect>
  <rect x="1.5" y="1.5" width="757" height="217" rx="32" stroke="#39ff14" stroke-opacity=".8" stroke-width="2"></rect>

  <circle cx="590" cy="108" r="145" fill="url(#light)"></circle>
  <circle class="pulse glow" cx="668" cy="110" r="17" fill="#8cff66"></circle>
  <circle class="pulse" cx="668" cy="110" r="34" stroke="#39ff14" stroke-opacity=".45" stroke-width="2"></circle>
  <circle class="pulse" cx="668" cy="110" r="48" stroke="#39ff14" stroke-opacity=".25" stroke-width="2"></circle>

  <rect x="46" y="38" width="330" height="64" rx="26" fill="#061006" stroke="#39ff14" stroke-opacity=".85" stroke-width="2"></rect>
  <rect x="62" y="50" width="48" height="40" rx="8" fill="#071607" stroke="#39ff14" stroke-opacity=".65"></rect>

  <path d="M76 55H92L101 64V86H76V55Z" stroke="#39ff14" stroke-width="3" fill="none"></path>
  <path d="M92 55V64H101" stroke="#39ff14" stroke-width="3"></path>
  <path d="M80 75C85 68 91 68 96 75" stroke="#39ff14" stroke-width="3" stroke-linecap="round"></path>
  <path d="M80 78C85 85 91 85 96 78" stroke="#39ff14" stroke-width="3" stroke-linecap="round"></path>

  <text x="132" y="77" class="label">COMPANY PROFILE</text>

  <text x="46" y="158" class="title">Company Profile Link</text>

  <line x1="46" y1="185" x2="355" y2="185" stroke="#39ff14" stroke-width="3" stroke-linecap="round" opacity=".55"></line>
  <line class="scan glow" x1="46" y1="185" x2="170" y2="185" stroke="#ffffff" stroke-width="4" stroke-linecap="round"></line>

  <path d="M35 30H180L210 50H390" stroke="#39ff14" stroke-opacity=".28"></path>
  <path d="M500 35H710" stroke="#39ff14" stroke-opacity=".2"></path>
  <path d="M570 190H720" stroke="#39ff14" stroke-opacity=".18"></path>
</svg>